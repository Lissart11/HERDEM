<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hantech Klima | Profesyonel Çözümler</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f4f7f9;
            --text-color: #2c3e50;
            --accent-color: #0077b6;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            background: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { font-size: 24px; margin-bottom: 10px; font-weight: 700; }
        
        .description {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #555;
            padding: 0 10px;
        }

        .link-card {
            background: var(--white);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            text-decoration: none;
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .link-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: var(--accent-color);
        }

        .link-content { display: flex; align-items: center; }
        .link-content i {
            font-size: 20px;
            margin-right: 15px;
            color: var(--accent-color);
        }

        .link-text { font-weight: 600; font-size: 16px; }

        .price-btn {
            background-color: var(--accent-color);
            color: white !important;
            border-color: var(--accent-color);
        }

        footer {
            margin-top: 40px;
            font-size: 12px;
            color: #999;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-img">
            <i class="fas fa-snowflake"></i>
        </div>

        <h1>Hantech Klima</h1>
        
        <div class="description">
            <strong>Mevsimi dışarıda bırakın.</strong><br>
            Hantech'in yüksek enerji tasarruflu Inverter teknolojisi ve sessiz çalışma performansıyla tanışın. Modern tasarımın iklimlendirme ile buluştuğu nokta.
        </div>

        <div class="link-card">
            <div class="link-content">
                <i class="fas fa-wind"></i>
                <div class="link-text">Hantech Inverter Modelleri</div>
            </div>
        </div>

        <a href="https://wa.me/905441746447" target="_blank" class="link-card price-btn">
            <div class="link-content">
                <i class="fab fa-whatsapp" style="color: white;"></i>
                <div class="link-text">Fiyat Al & WhatsApp</div>
            </div>
            <i class="fas fa-chevron-right"></i>
        </a>

        <a href="https://instagram.com/Hantech_klima47" target="_blank" class="link-card">
            <div class="link-content">
                <i class="fab fa-instagram"></i>
                <div class="link-text">Instagram'da Takip Et</div>
            </div>
            <i class="fas fa-chevron-right"></i>
        </a>

        <footer>PROFESYONEL İKLİMLENDİRME ÇÖZÜMLERİ</footer>
    </div>

</body>
</html>
